<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omi日次サマリー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  header { padding: 24px 0 16px; border-bottom: 1px solid #2a2a2a; margin-bottom: 20px; }
  header h1 { font-size: 1.4em; font-weight: 600; color: #fff; }
  header p { font-size: 0.85em; color: #888; margin-top: 4px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.9em; transition: all 0.15s; }
  .tab.active { background: #1f1f1f; border-bottom-color: #1f1f1f; color: #fff; }
  .tab:hover:not(.active) { color: #bbb; }
  .date-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .date-nav button { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
  .date-nav button:hover { background: #252525; border-color: #555; }
  .date-nav input[type="date"] { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; }
  .date-label { font-size: 1.1em; font-weight: 500; color: #fff; flex: 1; text-align: center; }
  .loading { text-align: center; padding: 40px; color: #666; }
  .error { text-align: center; padding: 40px; color: #666; }
  .error .icon { font-size: 2em; margin-bottom: 8px; }
  .summary, .raw-view { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .category { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .category h2 { font-size: 0.95em; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .category ul { list-style: none; padding: 0; }
  .category li { padding: 6px 0; font-size: 0.9em; line-height: 1.5; color: #bbb; border-bottom: 1px solid #222; }
  .category li:last-child { border-bottom: none; }
  .category .empty { color: #555; font-style: italic; font-size: 0.85em; }
  .cat-food h2 { color: #f59e0b; }
  .cat-exercise h2 { color: #10b981; }
  .cat-health h2 { color: #3b82f6; }
  .cat-work h2 { color: #8b5cf6; }
  .cat-family h2 { color: #ec4899; }
  .cat-other h2 { color: #6b7280; }
  .meta { text-align: center; font-size: 0.8em; color: #555; margin-top: 16px; padding-top: 16px; border-top: 1px solid #2a2a2a; }
  .calorie-badge { display: inline-block; background: #f59e0b22; color: #f59e0b; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 500; margin-left: 8px; }

  /* Raw conversation cards */
  .conv-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .conv-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
  .conv-header:hover { background: #1f1f1f; }
  .conv-time { color: #888; font-size: 0.8em; white-space: nowrap; min-width: 42px; padding-top: 2px; }
  .conv-info { flex: 1; }
  .conv-title { font-size: 0.9em; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
  .conv-cat { display: inline-block; font-size: 0.75em; padding: 1px 8px; border-radius: 4px; background: #ffffff10; color: #999; }
  .conv-arrow { color: #555; font-size: 0.8em; padding-top: 2px; transition: transform 0.2s; }
  .conv-card.open .conv-arrow { transform: rotate(90deg); }
  .conv-body { display: none; padding: 0 16px 16px; }
  .conv-card.open .conv-body { display: block; }
  .conv-overview { font-size: 0.85em; line-height: 1.7; color: #aaa; white-space: pre-wrap; }
  .conv-duration { font-size: 0.75em; color: #666; margin-top: 8px; }
  .raw-count { font-size: 0.85em; color: #888; margin-bottom: 16px; }
  .conv-transcript-toggle { font-size: 0.8em; color: #666; cursor: pointer; margin-top: 10px; padding: 6px 0; border-top: 1px solid #2a2a2a; }
  .conv-transcript-toggle:hover { color: #999; }
  .conv-transcript { display: none; margin-top: 8px; max-height: 400px; overflow-y: auto; padding: 8px; background: #111; border-radius: 8px; }
  .conv-transcript.show { display: block; }
  .seg { padding: 3px 0; font-size: 0.82em; line-height: 1.5; }
  .seg-speaker { font-weight: 600; font-size: 0.75em; }
  .seg-user .seg-speaker { color: #3b82f6; }
  .seg-other .seg-speaker { color: #f59e0b; }
  .seg-text { color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Omi日次サマリー</h1>
    <p>Omiウェアラブルから自動整理された1日の記録</p>
  </header>

  <div class="date-nav">
    <button id="prev">&larr;</button>
    <input type="date" id="datePicker">
    <span class="date-label" id="dateLabel"></span>
    <button id="next">&rarr;</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="summary">整理済み</div>
    <div class="tab" data-tab="raw">Omi原文</div>
  </div>

  <div id="content">
    <div class="loading">読み込み中...</div>
  </div>

  <div class="meta" id="meta"></div>
</div>

<script>
const REPO = 'johno-prog/omi-daily-summary';
const BRANCH = 'main';
const DAYS = ['日','月','火','水','木','金','土'];

let currentDate = todayJST();
currentDate.setDate(currentDate.getDate() - 1);
let currentTab = 'summary';
let cachedMd = null;
let cachedJson = null;
let cachedDateStr = null;

const datePicker = document.getElementById('datePicker');
const dateLabel = document.getElementById('dateLabel');
const content = document.getElementById('content');
const meta = document.getElementById('meta');

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function formatLabel(d) {
  return `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`;
}

// Get today in JST
function todayJST() {
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 3600 * 1000);
  return new Date(jst.getUTCFullYear(), jst.getUTCMonth(), jst.getUTCDate());
}

function setDate(d) {
  currentDate = d;
  datePicker.value = toDateStr(d);
  dateLabel.textContent = formatLabel(d);
  cachedMd = null;
  cachedJson = null;
  cachedDateStr = toDateStr(d);
  loadData(cachedDateStr);
}

document.getElementById('prev').onclick = () => {
  const d = new Date(currentDate);
  d.setDate(d.getDate() - 1);
  setDate(d);
};

document.getElementById('next').onclick = () => {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + 1);
  setDate(d);
};

datePicker.onchange = () => {
  setDate(new Date(datePicker.value + 'T00:00:00'));
};

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  };
});

async function loadData(dateStr) {
  content.innerHTML = '<div class="loading">読み込み中...</div>';
  meta.textContent = '';

  const base = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/daily/${dateStr}`;
  const [mdRes, jsonRes] = await Promise.all([
    fetch(`${base}.md`).catch(() => null),
    fetch(`${base}.json`).catch(() => null)
  ]);

  cachedMd = (mdRes && mdRes.ok) ? await mdRes.text() : null;
  cachedJson = (jsonRes && jsonRes.ok) ? await jsonRes.json() : null;

  if (!cachedMd && !cachedJson) {
    content.innerHTML = '<div class="error"><div class="icon">-</div>この日のデータはまだありません</div>';
    return;
  }
  render();
}

function render() {
  if (currentTab === 'summary') {
    if (cachedMd) {
      renderSummary(cachedMd);
    } else {
      content.innerHTML = '<div class="error">整理済みデータはまだありません</div>';
    }
  } else {
    if (cachedJson) {
      renderRaw(cachedJson);
    } else {
      content.innerHTML = '<div class="error">Omi原文データはまだありません</div>';
    }
  }
}

function toJST(utcStr) {
  const d = new Date(utcStr);
  return d.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', hour12: false });
}

function durationMin(start, end) {
  const ms = new Date(end) - new Date(start);
  return Math.round(ms / 60000);
}

const catColors = {
  family: '#ec4899', health: '#3b82f6', work: '#8b5cf6', social: '#f59e0b',
  technology: '#06b6d4', food: '#f59e0b', finance: '#10b981', business: '#8b5cf6',
  real: '#6b7280', other: '#6b7280'
};

const catLabels = {
  family: '家族', health: '健康', work: '仕事', social: '社交',
  technology: '技術', food: '食事', finance: '金融', business: 'ビジネス',
  real: '生活', other: 'その他'
};

function renderRaw(conversations) {
  let html = `<div class="raw-view">`;
  html += `<div class="raw-count">Omi会話 ${conversations.length}件（タップで展開）</div>`;

  for (const c of conversations) {
    const s = c.structured || {};
    const title = s.title || c.title || '(無題)';
    const overview = s.overview || c.overview || '';
    const category = s.category || c.category || 'other';
    const time = toJST(c.started_at);
    const dur = durationMin(c.started_at, c.finished_at);
    const color = catColors[category] || '#6b7280';
    const label = catLabels[category] || category;
    const segs = c.transcript_segments || [];

    html += `<div class="conv-card" onclick="this.classList.toggle('open')">`;
    html += `<div class="conv-header">`;
    html += `<div class="conv-time">${time}</div>`;
    html += `<div class="conv-info">`;
    html += `<div class="conv-title">${escHtml(title)}</div>`;
    html += `<span class="conv-cat" style="color:${color};border:1px solid ${color}33">${label}</span>`;
    if (segs.length > 0) html += `<span class="conv-cat" style="margin-left:4px">${segs.length}発言</span>`;
    html += `</div>`;
    html += `<div class="conv-arrow">&#9654;</div>`;
    html += `</div>`;
    html += `<div class="conv-body">`;
    html += `<div class="conv-overview">${escHtml(overview)}</div>`;
    if (segs.length > 0) {
      html += `<div class="conv-transcript-toggle" onclick="event.stopPropagation();this.nextElementSibling.classList.toggle('show');this.textContent=this.textContent==='▶ 会話ログを表示'?'▼ 会話ログを閉じる':'▶ 会話ログを表示'">▶ 会話ログを表示</div>`;
      html += `<div class="conv-transcript">`;
      for (const seg of segs) {
        const speaker = seg.speaker_name || ('Speaker ' + seg.speaker_id);
        const isUser = speaker === 'User' || seg.speaker_id === 0;
        html += `<div class="seg ${isUser ? 'seg-user' : 'seg-other'}">`;
        html += `<span class="seg-speaker">${escHtml(speaker)}</span> `;
        html += `<span class="seg-text">${escHtml(seg.text)}</span>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `<div class="conv-duration">${dur}分間</div>`;
    html += `</div>`;
    html += `</div>`;
  }

  html += '</div>';
  content.innerHTML = html;
  meta.textContent = `Omi原文 ${conversations.length}件`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSummary(md) {
  const categories = [
    { key: 'food', title: '食事', icon: '🍽', class: 'cat-food', pattern: /## 食事\n([\s\S]*?)(?=\n## |---|\n$)/ },
    { key: 'exercise', title: '運動', icon: '🏃', class: 'cat-exercise', pattern: /## 運動\n([\s\S]*?)(?=\n## |---|\n$)/ },
    { key: 'health', title: '健康', icon: '💊', class: 'cat-health', pattern: /## 健康\n([\s\S]*?)(?=\n## |---|\n$)/ },
    { key: 'work', title: '仕事', icon: '💼', class: 'cat-work', pattern: /## 仕事\n([\s\S]*?)(?=\n## |---|\n$)/ },
    { key: 'family', title: '家族', icon: '👨‍👩‍👦', class: 'cat-family', pattern: /## 家族\n([\s\S]*?)(?=\n## |---|\n$)/ },
    { key: 'other', title: 'その他', icon: '📌', class: 'cat-other', pattern: /## その他\n([\s\S]*?)(?=\n## |---|\n$)/ },
  ];

  let html = '<div class="summary">';

  for (const cat of categories) {
    const match = md.match(cat.pattern);
    const body = match ? match[1].trim() : '';
    const lines = body.split('\n').filter(l => l.trim().startsWith('- '));
    const isEmpty = lines.length === 0 || body.includes('記録なし');

    html += `<div class="category ${cat.class}">`;
    html += `<h2>${cat.icon} ${cat.title}`;

    if (cat.key === 'food' && !isEmpty) {
      const calMatch = body.match(/推定合計[:：]\s*約?([\d,]+)/);
      if (calMatch) {
        html += `<span class="calorie-badge">${calMatch[1]}kcal</span>`;
      }
    }
    html += '</h2>';

    if (isEmpty) {
      html += '<div class="empty">（記録なし）</div>';
    } else {
      html += '<ul>';
      for (const line of lines) {
        html += `<li>${escHtml(line.replace(/^-\s*/, ''))}</li>`;
      }
      html += '</ul>';
    }
    html += '</div>';
  }

  html += '</div>';
  content.innerHTML = html;

  const countMatch = md.match(/Omi会話\s*(\d+)件/);
  const genMatch = md.match(/生成日時[:：]\s*(.+)/);
  let metaText = '';
  if (countMatch) metaText += `元データ: Omi会話 ${countMatch[1]}件`;
  if (genMatch) metaText += ` | 生成: ${genMatch[1]}`;
  meta.textContent = metaText;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') document.getElementById('prev').click();
  if (e.key === 'ArrowRight') document.getElementById('next').click();
});

// Init
setDate(currentDate);
</script>
</body>
</html>
